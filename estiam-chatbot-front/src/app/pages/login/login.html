<form class="custom-form" (ngSubmit)="onSubmitLogin()" [formGroup]="formulaire">

  <mat-form-field>
    <mat-label>Email</mat-label>
    <input matInput placeholder="Ex. john@doe.com" formControlName="email"/>

    @if(formulaire.get('email')?.hasError('required')) {
      <mat-error>L'email est obligatoire</mat-error>
    } @else {
      <mat-error>L'email est mal formé</mat-error>
    }

  </mat-form-field>

  <mat-form-field>
    <mat-label>Mot de passe</mat-label>
    <input matInput type="password" formControlName="password"/>
    <mat-error>Le mot de passe est obligatoire</mat-error>
  </mat-form-field>

  <button matButton="elevated" type="submit">Se connecter</button>

</form>
